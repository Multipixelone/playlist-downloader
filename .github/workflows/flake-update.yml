name: Flake Update
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # daily at 00:00 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: flake-update
  cancel-in-progress: false

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Nix and Attic
        uses: ./.github/actions/setup-nix-attic
        with:
          attic-key: ${{ secrets.ATTIC_KEY }}

      - name: Update flake.lock
        id: update
        # GH_TOKEN must be a PAT or GitHub App token (not the default GITHUB_TOKEN)
        # so the opened PR triggers downstream CI runs.
        uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        with:
          pr-title: "chore(deps): update flake.lock"
          commit-msg: "chore(deps): update flake.lock"
          pr-assignees: Multipixelone
          token: ${{ secrets.GH_TOKEN }}

      - name: Enable auto-merge
        if: ${{ steps.update.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: gh pr merge --auto --squash ${{ steps.update.outputs.pull-request-number }}
